{% extends "base.html" %}

{% block title %}404 - Страница не найдена{% endblock %}

{% block content %}
<div class="error-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center;">
    <div class="error-card glass-morphism" style="padding: 4rem; border-radius: 24px; background: var(--surface-glass); border: 1px solid var(--surface-glass-border); backdrop-filter: blur(12px); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); transition: transform 0.3s ease; animation: slideUp 0.6s ease-out;">
        <h1 style="font-size: 8rem; margin: 0; background: linear-gradient(135deg, var(--primary-color) 0%, #a855f7 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; line-height: 1;">404</h1>
        <h2 style="font-size: 2rem; margin: 1rem 0; color: var(--text-main); line-height: 1.3;">Упс! Страница потерялась во времени</h2>
        <p style="color: var(--text-muted); margin: 0 auto 2.5rem auto; max-width: 450px; font-size: 1.1rem; line-height: 1.6;">
            Похоже, это аниме еще не вышло или ссылка была удалена. Попробуйте вернуться на главную.
        </p>
        <a href="{{ url_for('index') }}" class="btn-modern" style="padding: 1rem 2.5rem; font-size: 1.1rem; text-decoration: none; display: inline-block;">
            На главную страницу
        </a>
    </div>
</div>

<style>
@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.error-card:hover {
    transform: translateY(-5px);
}
</style>
{% endblock %}
