{% extends "base.html" %}

{% block title %}Результаты поиска{% endblock %}

{% block content %}
<div style="margin-top: 40px; margin-bottom: 60px;">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 30px;">
        <h1 style="margin: 0;">Результаты <span style="color: var(--primary-color);">поиска</span></h1>
        <!-- Индикатор загрузки -->
        <div id="loading-indicator" style="display: flex; align-items: center; transform: translateY(2px);">
            <div class="theme-spinner" style="width: 20px; height: 20px; border-width: 3px;"></div>
        </div>
    </div>

    <h2 id="anime-header"></h2>
    <div id="anime-results" class="search-results-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px;">
        <!-- Сюда динамически добавляются результаты аниме -->
    </div>

    <div id="others-section" style="margin-top: 60px; display: none;">
        <h2 style="margin-bottom: 30px; font-size: 1.5rem;">Прочее:</h2>
        <div id="others-list" class="others-list" style="display: grid; gap: 10px;">
            <!-- Сюда динамически добавляются другие результаты -->
        </div>
    </div>

    <div id="no-results" class="glass-card fade-in" style="padding: 40px; text-align: center; display: none;">
        <h3 style="color: var(--text-muted);">По вашему запросу ничего не найдено</h3>
    </div>
</div>

<style>
    .search-card {
        transition: var(--transition-smooth);
    }
    .search-card:hover {
        transform: scale(1.02);
        border-color: var(--primary-color);
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    
    .theme-spinner {
        display: inline-block;
        width: 50px;
        height: 50px;
        border: 4px solid var(--surface-light); /* Светло-серый/темно-серый фон в зависимости от темы */
        border-top: 4px solid var(--primary-color);     /* Фиолетовый акцент */
        border-radius: 100%;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
{% endblock %}

{% block scripts %}
<script type="application/json" id="search-query">{{ query|tojson }}</script>
<script type="application/json" id="search-db">{{ db|tojson }}</script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const queryStr = JSON.parse(document.getElementById('search-query').textContent);
        const dbStr = JSON.parse(document.getElementById('search-db').textContent);
        const animeContainer = document.getElementById('anime-results');
        const animeHeader = document.getElementById('anime-header');
        const othersSection = document.getElementById('others-section');
        const othersList = document.getElementById('others-list');
        const loading = document.getElementById('loading-indicator');
        const noResults = document.getElementById('no-results');
        let totalFound = 0;

        const eventSource = new EventSource(`/api/search/stream/${dbStr}/${encodeURIComponent(queryStr)}/`);

        eventSource.onmessage = function(e) {
            const item = JSON.parse(e.data);
            if (item.error) {
                console.error("Search error:", item.error);
                return;
            }

            totalFound++;
            
            if (item.category === 'anime') {
                animeHeader.style.display = 'block';
                
                const a = document.createElement('a');
                a.href = `/download/sh/${item.id}/`;
                a.className = "glass-card search-card fade-in";
                a.style.cssText = "display: flex; gap: 20px; overflow: hidden; height: 180px;";
                
                a.innerHTML = `
                    <img src="${item.image}" style="width: 120px; height: 100%; object-fit: cover; border-right: 1px solid var(--surface-glass-border);" loading="lazy">
                    <div style="padding: 20px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; min-width: 0;">
                        <h3 style="font-size: 1.1rem; margin-bottom: 10px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.title}</h3>
                        <div style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; overflow: hidden;">
                            <p style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Тип: ${item.type}</p>
                            <p style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Статус: ${item.status}</p>
                            <p style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Даты: ${item.date}</p>
                        </div>
                    </div>
                `;
                animeContainer.appendChild(a);
            } else if (item.category === 'other') {
                othersSection.style.display = 'block';
                
                const a = document.createElement('a');
                a.href = `/download/kp/${item.id}/`;
                a.className = "glass-card fade-in";
                a.style.cssText = "padding: 15px 25px; display: block;";
                
                a.innerHTML = `
                    <span style="color: var(--text-muted); margin-right: 10px;">${item.type}</span>
                    <span style="font-weight: 500;">${item.title}</span>
                    <span style="float: right; color: var(--text-muted); font-size: 0.9rem;">${item.date}</span>
                `;
                othersList.appendChild(a);
            }
        };

        eventSource.addEventListener('close', function(e) {
            eventSource.close();
            loading.style.display = 'none';
            if (totalFound === 0) {
                noResults.style.display = 'block';
            }
        });

        eventSource.onerror = function(e) {
            eventSource.close();
            loading.style.display = 'none';
            if (totalFound === 0) {
                 noResults.style.display = 'block';
                 noResults.innerHTML = '<h3 style="color: var(--text-muted);">Произошла ошибка при поиске или соединение прервано</h3>';
            }
        };
    });
</script>
{% endblock %}
